<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MyCare - Home</title>
    <link rel="stylesheet" href="style.css" />
</head>

<body>
     <div class="header-container">
     <div class="header">
        <img src="selfcare.jpeg" alt="Self Care Logo" class="logo" />
        <h1>MyCare</h1>
        <button id="theme-toggle" title="Toggle Theme">🌙</button>
    </div>

    <div class="button-container" id="main-content">
        <div class="feature-card" onclick="openPage('journal')">
            <img src="journal.jpeg" alt="Journal" />
            <p>Journal</p>
        </div>

        <div class="feature-card" onclick="openPage('study')">
            <img src="study.jpeg" alt="Study" />
            <p>Study</p>
        </div>

        <div class="feature-card" onclick="openPage('hair')">
            <img src="hair.jpeg" alt="Hair Care" />
            <p>Hair Care</p>
        </div>

        <div class="feature-card" onclick="openPage('skin')">
            <img src="skin.jpeg" alt="Skin Care" />
            <p>Skin Care</p>
        </div>

        <div class="feature-card" onclick="openPage('fitness')">
            <img src="fitness.jpeg" alt="Fitness" />
            <p>Fitness</p>
        </div>
    </div>

    <script src="script.js">

    </script>
</body>

</html>
